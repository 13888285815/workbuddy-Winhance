name: Build WindowsUninstall

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.102'

    - name: Restore dependencies
      run: dotnet restore Winhance.sln

    - name: Build solution
      run: dotnet build Winhance.sln --configuration Release --platform x64

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WindowsUninstall-Build
        path: |
          src/Winhance.UI/bin/x64/Release/net10.0-windows10.0.19041.0/win-x64/
          src/Winhance.Core/bin/x64/Release/
          src/Winhance.Infrastructure/bin/x64/Release/
        retention-days: 7
